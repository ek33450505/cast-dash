name: Bug Report
description: Report a bug or unexpected behavior in cast-dash
labels: [bug]
title: "[Bug] "
body:
  - type: input
    id: version
    attributes:
      label: cast-dash Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: [macOS, Linux]
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "e.g. 3.11.4"
  - type: dropdown
    id: panel
    attributes:
      label: Dashboard Panel Involved
      options: [Active Agents, "Today's Stats", Recent Runs, System Health, General / Startup, other]
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Include terminal emulator, cast.db size, or textual version if relevant
